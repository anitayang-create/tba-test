        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const addToCart = (product, quantity, selectedVariants) => {
        const newItem = {
          cartId: Date.now(),
          product,
          quantity,
          selectedVariants
        };
        setCartItems([...cartItems, newItem]);
        showToast(`已將 ${product.name} 加入購物車`, 'success');
      };

      const removeFromCart = (cartId) => {
        setCartItems(cartItems.filter(item => item.cartId !== cartId));
      };

      const updateCartQuantity = (cartId, newQuantity) => {
        setCartItems(cartItems.map(item => item.cartId === cartId ? { ...item, quantity: newQuantity } : item));
      };

      const clearCart = () => setCartItems([]);

      const addOrder = (order) => {
        setUserOrders([order, ...userOrders]);
      };

              clearCart();
              showToast('付款超時，訂單已取消並釋出庫存', 'error');
              navigate('shop');
              return 0;

            return prev - 1;

        return () => clearInterval(timer);
      }, [cartItems.length, clearCart, navigate, showToast]);

          items: cartItems.map(i => i.product),

    // 商品編輯表單 (於 MyStore 的商品管理使用)
    const ProductEditForm = ({ product, onBack }) => {
      const { showToast } = useContext(AppContext);
      const [variants, setVariants] = useState(product.variants || []);
      const [status, setStatus] = useState(product.status || '草稿');

      const addVariant = () => setVariants([...variants, { name: '', values: '' }]);
      const updateVariant = (index, field, value) => {
        const newV = [...variants];
        newV[index][field] = value;
        setVariants(newV);
      };
      const removeVariant = (index) => setVariants(variants.filter((_, i) => i !== index));

      const handleSave = () => {
        showToast('商品設定已儲存', 'success');
        onBack();
      }

      return (
        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="bg-white p-8 border border-stone-200 rounded-sm shadow-sm">
          <div className="flex justify-between items-center mb-8 border-b border-stone-200 pb-6">

            </div>
            <div className="flex gap-3">
              <select value={status} onChange={(e) => setStatus(e.target.value)} className="border border-stone-300 rounded-sm px-3 py-2 text-sm focus:outline-none focus:border-tba-blue bg-stone-50">

              <div><label className="block text-sm text-stone-700 font-medium mb-2">商品名稱</label><input type="text" defaultValue={product.name} placeholder="輸入商品名稱" className="w-full border border-stone-300 rounded-sm py-2.5 px-4 focus:outline-none focus:border-tba-blue" /></div>

            </main>

            {/* 頁尾 */}
            <footer className="bg-tba-blue-dark text-stone-400 py-20 px-6 md:px-12 mt-auto border-t-[16px] border-tba-blue-light">
              <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 mb-16">
                <div className="col-span-1 md:col-span-2">
                  <div className="flex items-center gap-2 mb-6 text-white"><span className="text-3xl font-serif font-bold tracking-wider">TBA</span></div>
                  <p className="text-sm leading-relaxed max-w-md text-stone-300">將藝術融入生活，讓靈感觸手可及。<br />Bringing art into life, making inspiration within reach.</p>
                </div>
                <div>
                  <h4 className="text-white text-sm tracking-widest uppercase mb-6">探索 / Explore</h4>
                  <ul className="space-y-4 text-sm">
                    <li><button onClick={() => navigate('home')} className="hover:text-white transition-colors">首頁 / Home</button></li>
                    <li><button onClick={() => navigate('shop')} className="hover:text-white transition-colors">精選商品 / Shop</button></li>
                  </ul>
                </div>
              </div>
            </footer>

            {/* 開發測試用：角色切換器 */}
            <div className="fixed bottom-0 right-0 m-4 z-[100] bg-white border border-stone-300 shadow-2xl rounded-sm p-3 text-xs flex flex-col gap-2">
              <p className="font-bold text-tba-blue pb-1 border-b border-stone-200">🛠 測試角色切換</p>
              <select value={simulatedRole} onChange={(e) => setSimulatedRole(e.target.value)} className="border border-stone-300 rounded p-1 focus:outline-none focus:border-tba-blue bg-stone-50 cursor-pointer">
                <option value="guest">訪客 (無特定權限)</option>
                <option value="consumer">一般消費者 (看會員中心)</option>
                <option value="enterprise">企業會員 (看統編/發票)</option>
                <option value="artist">藝術家 (看賣場+會員)</option>
                <option value="supplier">供應商 (看賣場)</option>
                <option value="manufacturer">製造商 (看賣場)</option>
              </select>
            </div>
          </div>
        </AppProvider>
      );
    }

    // 將 CartIcon 獨立出來以吃 Context
    const CartIconWithCount = ({ navigate }) => {
      const { cartItems } = useContext(AppContext);
      const totalItems = cartItems.reduce((sum, item) => sum + item.quantity, 0);

      return (
        <button onClick={() => navigate('cart')} className="hover:text-tba-blue transition-colors relative">
          <ShoppingCart size={20} strokeWidth={1.5} />
          {totalItems > 0 && (
            <span className="absolute -top-2 -right-2 bg-tba-blue text-white text-[10px] w-[18px] h-[18px] rounded-full flex items-center justify-center font-medium shadow-sm animate-pulse">
              {totalItems}
            </span>
          )}
        </button>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
